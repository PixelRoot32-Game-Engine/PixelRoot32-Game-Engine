; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = native
extra_configs = lib/platformio.ini

[env:native]
extends = base_native
lib_deps = symlink://../../
build_flags = 
    ${base_native.build_flags}
    -D PIXELROOT32_ENABLE_SCENE_ARENA
    -D PIXELROOT32_ENABLE_TOUCH=1
    -D PHYSICAL_DISPLAY_WIDTH=240
    -D PHYSICAL_DISPLAY_HEIGHT=240
    -Isrc
    -Iinclude
    -I.pio/libdeps/native/PixelRoot32-Game-Engine/include
    -I.pio/libdeps/native/PixelRoot32-Game-Engine/src
    -IC:/msys64/mingw64/include/SDL2
    -LC:/msys64/mingw64/lib
    -O2
    -Wall
    -Wextra
    -mconsole

[env:esp32dev]
extends = base_esp32
board = esp32dev
framework = arduino
lib_deps = symlink://../../
build_flags = 
    ${base_esp32.build_flags}
    -D PHYSICAL_DISPLAY_WIDTH=240
    -D PHYSICAL_DISPLAY_HEIGHT=240
    -D PLATFORM_ESP32DEV
    -D PIXELROOT32_ENABLE_SCENE_ARENA
    ; TFT config (ST7789 240x240)
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    -D TFT_MOSI=23
    -D TFT_SCLK=18
    -D TFT_DC=2
    -D TFT_RST=4
    -D TFT_CS=-1
    -D TOUCH_CS=-1
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000
    -Isrc
    -O2

[env:esp32cyd]
extends = base_esp32
board = esp32dev
framework = arduino
lib_deps = symlink://../../
build_flags = 
    ${base_esp32.build_flags}
	-D PIXELROOT32_ENABLE_DEBUG_OVERLAY
	-D PIXELROOT32_DEBUG_MODE
	;-D PIXELROOT32_ENABLE_PROFILING
	-D PIXELROOT32_ENABLE_SCENE_ARENA
    -D PHYSICAL_DISPLAY_WIDTH=240
    -D PHYSICAL_DISPLAY_HEIGHT=320
    -D PLATFORM_ESP32CYD
    ; TFT config (ILI9341_2 240x320)
	-D USER_SETUP_LOADED=1
    -D ILI9341_2_DRIVER
	-D TOUCH_DRIVER_XPT2046
	; 2432S028: XPT2046 on GPIO bus (32/39/25/33/IRQ36), not on TFT SPI
	-D XPT2046_USE_GPIO_SPI
    -D PIXELROOT32_ENABLE_TOUCH=1
	-D XPT2046_GPIO_VENDOR_COORDS=0
	; ADC X↔Y swapped vs display on 2432S028 — vertical finger motion was horizontal on screen and vice versa
	-D XPT2046_GPIO_SWAP_AXES=1
	; Horizontal mirror: left/right were inverted after axis swap on CYD
	-D XPT2046_GPIO_MIRROR_X=1
	; Map ADC usable range → full screen (resistive rarely uses 0–4095). Tune LO/HI with corners + serial:
	-D XPT2046_GPIO_USE_RAW_RANGE=1
	-D XPT2046_RAW_X_LO=320
	-D XPT2046_RAW_X_HI=3820
	-D XPT2046_RAW_Y_LO=320
	-D XPT2046_RAW_Y_HI=3820
	; Applied *after* mirror, in final screen space (see XPT2046Adapter GPIO pipeline).
	-D XPT2046_CAL_OFFSET_X=0
	-D XPT2046_CAL_OFFSET_Y=0
	-D TFT_BACKLIGHT_ON=HIGH
	-D TFT_INVERSION_ON
	-D TFT_WIDTH=240
	-D TFT_HEIGHT=320
	-D TFT_BL=21
	-D TFT_MISO=12
	-D TFT_MOSI=13
	-D TFT_SCLK=14
	-D TFT_DC=2
	-D TFT_RST=-1
	-D TFT_CS=15
	-D TOUCH_CS=33
	-D SPI_FREQUENCY=55000000
	-D SPI_READ_FREQUENCY=20000000
	-D SPI_TOUCH_FREQUENCY=2500000
