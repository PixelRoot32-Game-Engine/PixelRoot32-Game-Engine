; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; TEMPLATES

[base]
build_unflags = 
	-std=gnu++11        ; Remove C++11 standard flag (we use C++17 instead)
build_flags =
    -Wl,--gc-sections
	-std=gnu++17        ; Use GNU C++17 standard
    -fno-exceptions     ; Saves ~15KB Flash (Removes try/catch overhead)

[base_esp32]
platform = espressif32
monitor_speed = 115200
build_unflags = 
	${base.build_unflags}
build_flags =
    ${base.build_flags}
    -Os                  ; Optimize for binary size (useful on ESP32 with limited RAM/Flash)
    -flto                ; Link-Time Optimization (reduces binary size by combining code)
    -fuse-linker-plugin  ; Allows ld to use the LTO plugin; required for RISC-V toolchain
    -ffunction-sections  ; Put each function in its own section; helps remove unused functions (-Wl,--gc-sections)
    -fdata-sections      ; Same as above but for data; helps reduce flash usage
    -fno-lto             ; Disable LTO for problematic objects; prevents "plugin needed to handle lto object" in mixed C/C++ code
    -fno-rtti            ; Remove RTTI support; saves ~20 KB of Flash and RAM
	
    ; Reduced spatial and physics grid sizes for ESP32
	-D SPATIAL_GRID_MAX_STATIC_PER_CELL=4
	-D SPATIAL_GRID_MAX_DYNAMIC_PER_CELL=4
	-D PHYSICS_MAX_CONTACTS=64
	-D PHYSICS_MAX_PAIRS=64

[base_native]
platform = native
build_unflags = 
	${base.build_unflags}
build_flags =
    ${base.build_flags}
    -DPLATFORM_NATIVE
    -DSDL_MAIN_HANDLED
    -lSDL2

; MOTOR PROFILES

[profile_full]
build_flags =
    -D PIXELROOT32_ENABLE_AUDIO=1
    -D PIXELROOT32_ENABLE_PHYSICS=1
    -D PIXELROOT32_ENABLE_PARTICLES=1
    -D PIXELROOT32_ENABLE_UI_SYSTEM=1
    ; Physics timestep fix
    -D PIXELROOT32_ENABLE_PHYSICS_FIXED_TIMESTEP=1
    -D PIXELROOT32_VELOCITY_DAMPING=0.999
    -D PIXELROOT32_MAX_VELOCITY=500
    -D PIXELROOT32_HAS_FAST_RSQRT=1

[profile_arcade]
build_flags =
    -D PIXELROOT32_ENABLE_AUDIO=1
    -D PIXELROOT32_ENABLE_PHYSICS=1
    -D PIXELROOT32_ENABLE_PARTICLES=1
    -D PIXELROOT32_ENABLE_UI_SYSTEM=0
    ; Physics timestep fix (Phase 2-3)
    -D PIXELROOT32_ENABLE_PHYSICS_FIXED_TIMESTEP=1
    -D PIXELROOT32_VELOCITY_DAMPING=0.999
    -D PIXELROOT32_MAX_VELOCITY=500
    -D PIXELROOT32_HAS_FAST_RSQRT=1

[profile_puzzle]
build_flags =
    -D PIXELROOT32_ENABLE_AUDIO=1
    -D PIXELROOT32_ENABLE_PHYSICS=0
    -D PIXELROOT32_ENABLE_PARTICLES=0
    -D PIXELROOT32_ENABLE_UI_SYSTEM=1

[profile_retro]
build_flags =
    -D PIXELROOT32_ENABLE_AUDIO=0
    -D PIXELROOT32_ENABLE_PHYSICS=0
    -D PIXELROOT32_ENABLE_PARTICLES=0
    -D PIXELROOT32_ENABLE_UI_SYSTEM=0

; TESTS

[env:native_test]
extends = base_native
;extra_scripts = pre:fix_env.py
test_framework = unity
test_build_src = true
test_filter = unit/*
test_ignore = test_engine_integration/*, test_game_loop/*, test_background_palette_render_integration/*
build_flags = 
	${base_native.build_flags}
	-DUNIT_TEST
	-D PIXELROOT32_ENABLE_AUDIO=1
	-D PIXELROOT32_TESTING
	-Iinclude
	-Isrc/platforms/mock
	-D PIXELROOT32_ENABLE_2BPP_SPRITES
	-D PIXELROOT32_ENABLE_4BPP_SPRITES
    -D PIXELROOT32_DEBUG_MODE
    -D PIXELROOT32_ENABLE_PARTICLES=1
    -D PIXELROOT32_ENABLE_UI_SYSTEM=1
    -D PIXELROOT32_ENABLE_STATIC_TILEMAP_FB_CACHE=1
    -D PIXELROOT32_ENABLE_DIRTY_REGIONS=1
	--coverage
	-lgcov

; SIMULATOR TARGETS

[native_full]
extends = base_native, profile_full
build_flags =
    ${base_native.build_flags}
    ${profile_full.build_flags}

[native_arcade]
extends = base_native, profile_arcade
build_flags =
    ${base_native.build_flags}
    ${profile_arcade.build_flags}

[native_puzzle]
extends = base_native, profile_puzzle
build_flags =
    ${base_native.build_flags}
    ${profile_puzzle.build_flags}

[native_retro]
extends = base_native, profile_retro
build_flags =
    ${base_native.build_flags}
    ${profile_retro.build_flags}

; HARDWARE TARGETS

[esp32_full]
extends =base_esp32, profile_full
build_flags =
    ${base_esp32.build_flags}
    ${profile_full.build_flags}

[esp32_arcade]
extends =base_esp32, profile_arcade
build_flags =
    ${base_esp32.build_flags}
    ${profile_arcade.build_flags}

[esp32_puzzle]
extends =base_esp32, profile_puzzle
build_flags =
    ${base_esp32.build_flags}
    ${profile_puzzle.build_flags}

[esp32_retro]
extends =base_esp32, profile_retro
build_flags =
    ${base_esp32.build_flags}
    ${profile_retro.build_flags}